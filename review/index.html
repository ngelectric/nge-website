<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.googletagmanager.com">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="dns-prefetch" href="https://www.chatbase.co">
  <link rel="dns-prefetch" href="https://d3ey4dbjkt2f6s.cloudfront.net">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | New Ground Electric</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="../images/nge-logo-transparent_5b2df02c.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#1a3a2a;
min-height:100vh;display:flex;align-items:center;
justify-content:center;padding:24px}
.card{background:white;border-radius:16px;
padding:40px;max-width:460px;width:100%;
text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.logo{height:56px;margin-bottom:20px}
.stars{font-size:32px;margin-bottom:16px;letter-spacing:4px}
h1{font-size:24px;font-weight:700;color:#1a3a2a;margin-bottom:10px}
p{color:#6b7280;font-size:15px;line-height:1.6;margin-bottom:24px}
.btn{display:inline-block;background:#f59e0b;color:white;
font-weight:700;font-size:16px;padding:14px 32px;
border-radius:999px;text-decoration:none;margin-bottom:20px}
#countdown{font-size:13px;color:#9ca3af;margin-bottom:28px}
.qr-wrap{border-top:1px solid #e5e7eb;padding-top:24px}
.qr-label{font-size:11px;color:#9ca3af;text-transform:uppercase;
letter-spacing:0.5px;margin-bottom:12px}
#qrcode{margin:0 auto;width:160px}
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="../images/nge-logo-transparent_5b2df02c.png" alt="New Ground Electric" loading="lazy">
  <div class="stars">&#x2B50;&#x2B50;&#x2B50;&#x2B50;&#x2B50;</div>
  <h1>Thank You for Your Business!</h1>
  <p>A quick Google review helps Temecula homeowners find trusted electrical service &mdash; and means the world to us.</p>
  <a class="btn" id="reviewBtn" href="https://g.page/r/CWbAjAm94wfVEAE/review">
    &#x2B50; Leave a 5-Star Review
  </a>
  <p id="countdown">Redirecting in 5 seconds...</p>
  <div class="qr-wrap">
    <p class="qr-label">Scan to review on Google</p>
    <div id="qrcode"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
var URL='https://g.page/r/CWbAjAm94wfVEAE/review';
try{new QRCode(document.getElementById('qrcode'),{text:URL,width:160,height:160,colorDark:'#1a3a2a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}catch(e){}
var s=5;
var t=setInterval(function(){
  s--;
  var el=document.getElementById('countdown');
  if(el) el.textContent=s>0?'Redirecting in '+s+' seconds...':'Redirecting...';
  if(s<=0){clearInterval(t);window.location.href=URL;}
},1000);
</script>
</body>
</html>
